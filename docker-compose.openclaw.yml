# docker-compose.openclaw.yml
# Lab only. Do NOT use on Production. No production secrets.
#
# Before first up: create secrets/runtime.env (run bash scripts/setup_tavily_key.sh
# or: mkdir -p secrets && touch secrets/runtime.env). See docs/openclaw/TAVILY_WEB_SEARCH_SETUP.md.
#
# Hardening: non-root user, read_only, cap_drop ALL, no-new-privileges,
# mem/cpu limits, token only via read-only file mount (never in env).
# Token on host: ~/secrets/openclaw_token (chmod 600). No docker socket.
# See: docs/openclaw/RUNBOOK_SECURE_INSTALL.md, FINAL_SECURITY_CHECKLIST.md

name: openclaw-lab

services:
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/ccruz0/openclaw:latest}
    container_name: openclaw
    env_file:
      - .env.lab
      # Optional: for Tavily web search. Create via: bash scripts/setup_tavily_key.sh
      - secrets/runtime.env
    environment:
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:-https://dashboard.hilovivo.com,http://localhost:8080,http://127.0.0.1:8080}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OPENCLAW_CONTROL_UI_BASE_PATH=/openclaw/
      - OPENCLAW_TRUSTED_PROXIES=${OPENCLAW_TRUSTED_PROXIES:-172.31.32.169}
      - OPENCLAW_MODEL_PRIMARY=${OPENCLAW_MODEL_PRIMARY:-anthropic/claude-sonnet-4-20250514}
      - OPENCLAW_MODEL_FALLBACKS=${OPENCLAW_MODEL_FALLBACKS:-anthropic/claude-3-5-sonnet-20241022,openai/gpt-4o-mini,openai/gpt-4o,anthropic/claude-3-5-haiku-20241022}
      - NODE_ENV=production
      # Tavily web search (set in secrets/runtime.env via scripts/setup_tavily_key.sh)
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-tavily}
    volumes:
      # Persistent home — keeps devices, config, sessions across restarts
      - /opt/openclaw/home-data:/home/node/.openclaw
      # ATP repo as workspace so tools can read docs, source, etc.
      - /home/ubuntu/automated-trading-platform:/home/node/.openclaw/workspace/atp:ro
      - openclaw_workspace:/workspace
      - openclaw_logs:/var/log/openclaw
      - /home/ubuntu/secrets/openclaw_token:/run/secrets/openclaw_token:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
    user: "1000:1000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M
    ports:
      - "8080:18789"
    networks:
      - openclaw_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw_workspace:
  openclaw_logs:

networks:
  openclaw_net:
    driver: bridge
