# docker-compose.openclaw.yml
# Lab only. Do NOT use on Production. No production secrets.
#
# Before first up: create secrets/runtime.env (run bash scripts/setup_tavily_key.sh
# or: mkdir -p secrets && touch secrets/runtime.env). See docs/openclaw/TAVILY_WEB_SEARCH_SETUP.md.
#
# Hardening: non-root user, read_only, cap_drop ALL, no-new-privileges,
# mem/cpu limits, token only via read-only file mount (never in env).
# Docker socket: mounted for tool execution (docker ps, docker logs). Requires group_add
# with host docker GID (getent group docker). LAB default: 988.
# See: docs/openclaw/RUNBOOK_SECURE_INSTALL.md, OPENCLAW_DOCKER_SOCKET.md

name: openclaw-lab

services:
  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile.openclaw
    image: ${OPENCLAW_IMAGE:-openclaw-with-origins:latest}
    container_name: openclaw
    env_file:
      - .env.lab
      # Optional: for Tavily web search. Create via: bash scripts/setup_tavily_key.sh
      - secrets/runtime.env
    environment:
      # Telegram: PROD backend-aws must be the sole getUpdates consumer for @ATP_control_bot.
      # secrets/runtime.env often mirrors prod and includes TELEGRAM_*; OpenClaw would otherwise
      # poll the same token → HTTP 409 / "Another poller is active". Use UI/API for OpenClaw; do not bridge prod task bot here.
      - TELEGRAM_BOT_TOKEN=
      - TELEGRAM_BOT_TOKEN_AWS=
      - TELEGRAM_ATP_CONTROL_BOT_TOKEN=
      - TELEGRAM_CLAW_BOT_TOKEN=
      - TELEGRAM_BOT_TOKEN_DEV=
      - TELEGRAM_BOT_TOKEN_LOCAL=
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS:-https://dashboard.hilovivo.com,http://localhost:8080,http://127.0.0.1:8080}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
      - OPENCLAW_CONTROL_UI_BASE_PATH=/openclaw/
      - OPENCLAW_TRUSTED_PROXIES=${OPENCLAW_TRUSTED_PROXIES:-172.31.32.169}
      - OPENCLAW_MODEL_PRIMARY=${OPENCLAW_MODEL_PRIMARY:-openai/gpt-4o-mini}
      - OPENCLAW_MODEL_FALLBACKS=${OPENCLAW_MODEL_FALLBACKS:-anthropic/claude-3-5-haiku-20241022,anthropic/claude-3-5-sonnet-20241022,openai/gpt-4o,anthropic/claude-sonnet-4-20250514}
      # ACP default agent for Cursor integration (sessions_spawn / acp.defaultAgent)
      - OPENCLAW_ACP_DEFAULT_AGENT=${OPENCLAW_ACP_DEFAULT_AGENT:-codex}
      - NODE_ENV=production
      # Tavily web search (set in secrets/runtime.env via scripts/setup_tavily_key.sh)
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-tavily}
      # URL for "Update now" when running in Docker (host-side daemon)
      - OPENCLAW_UPDATE_DAEMON_URL=${OPENCLAW_UPDATE_DAEMON_URL:-http://host.docker.internal:19999/update}
    volumes:
      # Persistent home — keeps devices, config, sessions across restarts
      - /opt/openclaw/home-data:/home/node/.openclaw
      # ATP repo root must be the OpenClaw workspace dir (not workspace/atp): tools resolve
      # paths like backend/... and docs/... under ~/.openclaw/workspace/, not workspace/atp/...
      - /home/ubuntu/crypto-2.0:/home/node/.openclaw/workspace:ro
      - openclaw_workspace:/workspace
      - openclaw_logs:/var/log/openclaw
      - /home/ubuntu/secrets/openclaw_token:/run/secrets/openclaw_token:ro
      # Docker socket: tools can run docker ps/logs without sudo. Requires group_add below.
      - /var/run/docker.sock:/var/run/docker.sock
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
    user: "1000:1000"
    group_add:
      - "${DOCKER_GROUP_GID:-988}"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          memory: 512M
    ports:
      - "8080:18789"
    extra_hosts:
      # Allows container to reach host update daemon (openclaw-update-daemon.service on :19999)
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw_workspace:
  openclaw_logs:

networks:
  openclaw_net:
    driver: bridge
