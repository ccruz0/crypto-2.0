groups:
  - name: base
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels: { severity: "critical" }
        annotations:
          summary: "Target down: {{ $labels.job }} {{ $labels.instance }}"
          description: "Scrape target {{ $labels.job }} {{ $labels.instance }} has been down for more than 2m."

      - alert: HostDiskFillingUp
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) < 0.15
        for: 10m
        labels: { severity: "warning" }
        annotations:
          summary: "Disk low on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Filesystem {{ $labels.mountpoint }} has less than 15% space available for 10m."

      - alert: ContainerRestartsHigh
        expr: increase(container_start_time_seconds[15m]) > 2
        for: 5m
        labels: { severity: "warning" }
        annotations:
          summary: "Container restarts detected (cadvisor)"
          description: "One or more containers restarted more than twice in the last 15m."

      - alert: HostMemoryHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
        for: 5m
        labels: { severity: "warning" }
        annotations:
          summary: "Host memory low on {{ $labels.instance }} (<10% available)"
          description: "Available memory has been below 10% for 5m. Host is memory-pressured and may start swapping."

      - alert: HostMemoryCritical
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.05
        for: 5m
        labels: { severity: "critical" }
        annotations:
          summary: "Host memory critical on {{ $labels.instance }} (<5% available)"
          description: "Available memory has been below 5% for 5m. OOM-kills and severe swap thrashing are likely."

      - alert: HostSwapHigh
        expr: ((node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / clamp_min(node_memory_SwapTotal_bytes, 1)) > 0.25
        for: 10m
        labels: { severity: "warning" }
        annotations:
          summary: "Host swap usage high on {{ $labels.instance }} (>25% used)"
          description: "More than 25% of swap has been in use for 10m, indicating sustained memory pressure / thrashing."

      - alert: HostCPUSaturated
        expr: (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 0.85
        for: 10m
        labels: { severity: "warning" }
        annotations:
          summary: "Host CPU saturated on {{ $labels.instance }} (>85% non-idle)"
          description: "Non-idle CPU has averaged above 85% for 10m, indicating sustained CPU saturation."

  - name: backend_api
    rules:
      - alert: BackendHigh5xxRate
        expr: |
          (
            sum(rate(http_requests_total{job="backend",status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_requests_total{job="backend"}[5m])), 1e-9)
          ) > 0.02
        for: 5m
        labels: { severity: "critical" }
        annotations:
          summary: "Backend 5xx rate > 2%"
          description: "5xx response rate on backend exceeded 2% over the last 5m."

      - alert: BackendP95LatencyHigh
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job="backend"}[5m]))) > 0.8
        for: 10m
        labels: { severity: "warning" }
        annotations:
          summary: "Backend p95 latency > 800ms"
          description: "95th percentile HTTP request latency on backend exceeded 800ms for 10m."

      - alert: MarketUpdaterStalled
        expr: max(market_updater_heartbeat_age_seconds{job="market_updater"}) > 900
        for: 5m
        labels: { severity: "warning" }
        annotations:
          summary: "Market updater heartbeat age > 15m"
          description: "Market updater has not sent a heartbeat in over 15 minutes."

      - alert: ApprovalQueueStale
        expr: approval_queue_stale_total > 0
        for: 30m
        labels: { severity: "warning" }
        annotations:
          summary: "Approval queue has stale pending tasks"
          description: "One or more agent approval tasks have been pending longer than the configured stale threshold (default 24h). Review the Approval Center and resolve or expire stale items."
