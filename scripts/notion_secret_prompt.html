<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notion API secret</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.1rem; }
    label { display: block; margin-top: 0.75rem; }
    input[type="password"] { width: 100%; padding: 0.5rem; font-size: 0.95rem; box-sizing: border-box; }
    .actions { margin-top: 1rem; }
    button { padding: 0.5rem 1rem; font-size: 0.95rem; cursor: pointer; }
    .out { margin-top: 1rem; padding: 0.75rem; background: #f5f5f5; border-radius: 6px; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
    .hint { font-size: 0.85rem; color: #666; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Notion API secret</h1>
  <p class="hint">Paste your Notion Internal Integration Secret. It will only be used in your browser to build the line below.</p>
  <label for="secret">Secret</label>
  <input type="password" id="secret" placeholder="Paste here" autocomplete="off" />
  <div class="actions">
    <button type="button" id="copy">Copy line for backend/.env</button>
  </div>
  <div class="out" id="out" hidden></div>
  <p class="hint">Then add that line to <code>backend/.env</code> in your repo (create the file if needed).</p>
  <script>
    const secret = document.getElementById('secret');
    const out = document.getElementById('out');
    const copyBtn = document.getElementById('copy');
    function build() {
      const val = (secret.value || '').trim().replace(/^["']|["']$/g, '');
      return val ? 'NOTION_API_KEY=' + val : '';
    }
    function update() {
      const line = build();
      out.textContent = line || '(paste a secret first)';
      out.hidden = !line;
      copyBtn.disabled = !line;
    }
    secret.addEventListener('input', update);
    secret.addEventListener('paste', function () { setTimeout(update, 0); });
    copyBtn.addEventListener('click', function () {
      const line = build();
      if (!line) return;
      navigator.clipboard.writeText(line).then(function () {
        copyBtn.textContent = 'Copied. Add to backend/.env';
        setTimeout(function () { copyBtn.textContent = 'Copy line for backend/.env'; }, 2000);
      });
    });
    update();
  </script>
</body>
</html>
