# Logrotate for ATP health snapshot log.
# Install: sudo cp scripts/diag/logrotate-atp-health.conf /etc/logrotate.d/atp-health
# Or append to an existing /var/log/atp rule.
# Check: sudo logrotate -d /etc/logrotate.d/atp-health
#
# Validate logrotate is active (run on server):
#   systemctl list-timers | grep -i logrotate || true
#   systemctl status logrotate.timer --no-pager || true
#   ls -la /etc/cron.daily/logrotate || true
# Force one rotation (safe with copytruncate):
#   sudo logrotate -f /etc/logrotate.d/atp-health
#   ls -la /var/log/atp/health_snapshots.log*
# You should see health_snapshots.log.1 (or .1.gz after first daily run).
#
# Once a day: sudo wc -l /var/log/atp/health_snapshots.log
#             sudo du -h /var/log/atp/health_snapshots.log
# If the file grows too fast, ensure this logrotate is active.

/var/log/atp/health_snapshots.log {
    daily
    maxsize 50M
    rotate 14
    copytruncate
    missingok
    notifempty
    compress
    delaycompress
}
