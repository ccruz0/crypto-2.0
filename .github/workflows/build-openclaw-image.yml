# Build and push OpenClaw placeholder image to GHCR.
# Image: ghcr.io/ccruz0/crypto-2.0:openclaw (use OPENCLAW_IMAGE=ghcr.io/ccruz0/crypto-2.0:openclaw on LAB).
name: Build OpenClaw image

on:
  push:
    branches: [main]
    paths:
      - 'openclaw/**'
      - '.github/workflows/build-openclaw-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: openclaw/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:openclaw
          cache-from: type=gha
          cache-to: type=gha,mode=max
