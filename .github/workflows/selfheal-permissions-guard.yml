# Fail PRs that regress self-heal script executable bits in git (mode 100755).
name: Self-heal permissions guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  selfheal-permissions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify self-heal scripts are executable in git
        run: bash scripts/test_selfheal_executable_permissions.sh
