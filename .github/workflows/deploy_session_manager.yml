# Single source of truth for deploy: push to main runs this (SSM). No SSH deploy on push.
name: Deploy to AWS EC2 (Session Manager)

on:
  push:
    branches:
      - main
    # frontend-aws and backend-aws are built+deployed independently from ECR images
    # (deploy-frontend.yml / deploy-backend.yml). Those changes must not trigger the
    # heavy, OOM-prone on-host rebuild handled by this workflow.
    paths-ignore:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify monorepo frontend (no external repo)
      run: |
        set -e
        bash scripts/verify_no_external_frontend_deploy.sh --ci
        bash scripts/verify_no_external_frontend_deploy.sh --runtime
        echo "Monorepo commit: $(git rev-parse HEAD)"
        echo "Frontend source: ./frontend (same commit as monorepo)"
        test ! -d frontend/.git || { echo "ERROR: frontend/ must not be a separate git repo"; exit 1; }

    - name: Show frontend version entry
      run: |
        set -e
        bash scripts/verify_frontend_version.sh

    - name: Log deploy fingerprint (GitHub Actions)
      run: |
        echo "GITHUB_SHA=${{ github.sha }}"
        echo "GITHUB_REF=${{ github.ref }}"
        echo "GITHUB_RUN_ID=${{ github.run_id }}"
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1
        
    - name: Deploy to EC2 using Session Manager
      env:
        INSTANCE_ID: i-087953603011543c5  # atp-rebuild-2026 (PROD). Do not use crypto 2.0.
      run: |
        set -e  # Exit on any error
        
        echo "🔍 Deploying to instance: $INSTANCE_ID"
        
        # Inject GITHUB_TOKEN into .env.aws AND secrets/runtime.env (EC2 fetches from SSM; token never in workflow)
        # Both files are loaded by backend-aws; secrets/runtime.env is also sourced by entrypoint for reliability.
        echo "🔑 Injecting GITHUB_TOKEN into .env.aws and secrets/runtime.env (EC2 fetches from SSM)..."
        INJECT_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ubuntu/crypto-2.0 || cd ~/crypto-2.0 || true",
            "GHTOKEN=$(aws ssm get-parameter --name /automated-trading-platform/prod/github_token --with-decryption --query Parameter.Value --output text 2>/dev/null || aws ssm get-parameter --name /openclaw/github-token --with-decryption --query Parameter.Value --output text 2>/dev/null || true)",
            "if [ -n \"$GHTOKEN\" ]; then grep -q \"^GITHUB_TOKEN=\" .env.aws 2>/dev/null && sed -i \"s|^GITHUB_TOKEN=.*|GITHUB_TOKEN=$GHTOKEN|\" .env.aws || echo \"GITHUB_TOKEN=$GHTOKEN\" >> .env.aws; mkdir -p secrets; if grep -q \"^GITHUB_TOKEN=\" secrets/runtime.env 2>/dev/null; then sed -i \"s|^GITHUB_TOKEN=.*|GITHUB_TOKEN=$GHTOKEN|\" secrets/runtime.env; else echo \"GITHUB_TOKEN=$GHTOKEN\" >> secrets/runtime.env; fi; echo GITHUB_TOKEN injected; else echo No token in SSM; fi"
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId" 2>/dev/null || true)
        if [ -n "$INJECT_ID" ]; then
          aws ssm wait command-executed --command-id "$INJECT_ID" --instance-id $INSTANCE_ID --region ap-southeast-1 2>/dev/null || true
          echo "✅ GITHUB_TOKEN inject command sent"
        else
          echo "⚠️ Could not send GITHUB_TOKEN inject (SSM may be unreachable)"
        fi
        
        # Update code on EC2 using git pull (frontend/ is part of monorepo — no external frontend clone)
        echo "📥 Pulling latest monorepo code on EC2..."
        PULL_COMMAND_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "test -d /home/ubuntu/crypto-2.0/.git || { echo \"❌ Cannot find project directory\" && exit 1; }",
            "sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 fetch origin main || { echo \"❌ Git fetch failed\" && exit 1; }",
            "sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 switch main 2>/dev/null || sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 checkout main || { echo \"❌ Git checkout main failed\" && exit 1; }",
            "sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 reset --hard origin/main || { echo \"❌ Git reset to origin/main failed\" && exit 1; }",
            "echo \"GIT_BRANCH=$(sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 branch --show-current)\"",
            "echo \"GIT_HEAD=$(sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 rev-parse HEAD)\"",
            "echo \"GIT_ORIGIN_MAIN=$(sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 rev-parse origin/main)\"",
            "test \"$(sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 branch --show-current)\" = \"main\" || { echo \"❌ EC2 repo is not on main after checkout; aborting deploy\" && exit 1; }",
            "sudo -u ubuntu git -C /home/ubuntu/crypto-2.0 pull --ff-only origin main || { echo \"❌ Git pull failed\" && exit 1; }",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && git rev-parse --short HEAD\"",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && bash scripts/verify_no_external_frontend_deploy.sh --runtime\" || { echo \"❌ Runtime frontend guard failed\" && exit 1; }",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && bash scripts/verify_frontend_version.sh\" || { echo \"❌ Frontend version check failed\" && exit 1; }",
            "echo \"✅ Monorepo code updated and frontend verified\""
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId")
        
        # Wait for git pull to complete
        echo "⏳ Waiting for code update..."
        aws ssm wait command-executed \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 || true
        
        # Get output from git pull command to verify it worked
        echo "📄 Git pull output:"
        aws ssm get-command-invocation \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "StandardOutputContent" --output text || echo "Could not retrieve git pull output"
        
        # Check if git pull succeeded
        PULL_STATUS=$(aws ssm get-command-invocation \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "Status" --output text 2>/dev/null || echo "Unknown")
        
        if [ "$PULL_STATUS" != "Success" ]; then
          echo "❌ Git pull status: $PULL_STATUS"
          echo "❌ Aborting deploy — monorepo frontend must be at latest commit"
          exit 1
        fi
        
        # Now rebuild and restart
        echo "🐳 Rebuilding and restarting services..."
        
        # Execute deployment via SSM with proper JSON formatting
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ubuntu/crypto-2.0 || { echo \"❌ Cannot find project directory\" && exit 1; }",
            "bash scripts/aws/with_deploy_marker.sh bash -s <<'\''DEPLOY_EOF'\''",
            "echo \"📁 Current directory: $(pwd)\"",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && bash scripts/verify_no_external_frontend_deploy.sh --runtime\"",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && bash scripts/verify_frontend_version.sh\" || { echo \"❌ Frontend version check failed\" && exit 1; }",
            "echo \"🔐 Rendering secrets/runtime.env from SSM (ensures GITHUB_TOKEN and other deploy secrets)...\"",
            "bash scripts/aws/render_runtime_env.sh || { echo \"⚠️ render_runtime_env failed; continuing with existing secrets/runtime.env\" && true; }",
            "echo \"🔍 Verifying clean frontend working tree before Docker build...\"",
            "sudo -u ubuntu bash -lc \"cd /home/ubuntu/crypto-2.0 && bash scripts/verify_clean_worktree.sh --frontend-only\"",
            "echo \"🐳 Rebuilding and restarting AWS services (EXCLUDING frontend-aws, which is deployed from ECR by deploy-frontend.yml)...\"",
            "DEPLOY_SERVICES=$(docker compose --profile aws config --services | grep -vx 'frontend-aws' | tr '\\n' ' ')",
            "echo \"Services managed by this deploy: $DEPLOY_SERVICES\"",
            "export GIT_SHA=${{ github.sha }}",
            "export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "bash scripts/aws/export_build_fingerprint.sh || { echo \"❌ export_build_fingerprint failed\" && exit 1; }",
            "echo \"🧮 Pre-build disk guard: reclaim space BEFORE the build (volume-safe; never touches DB/metrics volumes or running-stack images)...\"",
            "MIN_FREE_GB=${MIN_FREE_GB:-6} bash scripts/aws/predeploy_disk_guard.sh || echo \"⚠️ disk guard reported insufficient space; attempting build anyway (previous stack keeps serving if build fails)\"",
            "echo \"🛟 SAFE DEPLOY: no compose-down before build. The currently-running stack keeps serving while the new images build. If anything interrupts the deploy before up, the previous containers remain up (Outcome B).\"",
            "echo \"🐳 Building new images (old stack still serving; frontend-aws excluded)...\"",
            "docker compose --env-file .deploy-fingerprint.env --profile aws build --no-cache $DEPLOY_SERVICES",
            "echo \"🚀 Rolling update: up -d recreates only changed containers and leaves the rest (incl. frontend-aws) running...\"",
            "docker compose --env-file .deploy-fingerprint.env --profile aws up -d --remove-orphans $DEPLOY_SERVICES",
            "echo \"🔎 Verifying baked fingerprint in backend-aws image...\"",
            "CID=$(docker compose --env-file .deploy-fingerprint.env --profile aws ps -q backend-aws)",
            "docker exec \"$CID\" cat /app/.git_sha",
            "docker exec \"$CID\" cat /app/.build_time",
            "BAKED_SHA=$(docker exec \"$CID\" cat /app/.git_sha | tr -d '\\n')",
            "if [ \"$BAKED_SHA\" != \"$GIT_SHA\" ]; then echo \"❌ /app/.git_sha ($BAKED_SHA) != GIT_SHA ($GIT_SHA)\" && exit 1; fi",
            "echo \"✅ Baked fingerprint matches GIT_SHA=$GIT_SHA\"",
            "echo \"⏳ Waiting for services to start (backend needs ~3 minutes for healthcheck)...\"",
            "echo \"⏳ Waiting 30 seconds for initial startup...\"",
            "sleep 30",
            "echo \"⏳ Waiting for backend healthcheck (up to 3 minutes)...\"",
            "for i in {1..20}; do",
            "  if curl -f --connect-timeout 5 http://localhost:8002/ping_fast >/dev/null 2>&1; then",
            "    echo \"✅ Backend is healthy!\"",
            "    break",
            "  fi",
            "  echo \"⏳ Backend not ready yet, waiting... ($i/20)\"",
            "  sleep 10",
            "done",
            "echo \"🧹 Post-up cleanup (only AFTER the stack is up, so we never prune an image we still need)...\"",
            "docker image prune -f 2>/dev/null || true",
            "docker builder prune -af 2>/dev/null || true",
            "echo \"🔄 Reloading nginx to reconnect to services (reload first; restart only if reload fails)...\"",
            "sudo systemctl reload nginx || sudo systemctl restart nginx || echo \"⚠️  nginx reload/restart failed, continuing...\"",
            "sleep 5",
            "echo \"✅ Verifying deployment...\"",
            "docker compose --env-file .deploy-fingerprint.env --profile aws ps",
            "echo \"✅ Deployment completed!\"",
            "DEPLOY_EOF"
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId")
        
        echo "📋 Command ID: $COMMAND_ID"
        
        # Wait for Docker rebuild SSM command (15 min timeout; poll every 12s)
        POLL_INTERVAL=12
        MAX_POLLS=75
        TIMEOUT_SECONDS=$((POLL_INTERVAL * MAX_POLLS))
        echo "⏳ Waiting for Docker rebuild SSM command (timeout: ${TIMEOUT_SECONDS}s, poll every ${POLL_INTERVAL}s)..."

        print_ssm_output() {
          echo "📄 Standard output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(could not retrieve stdout)"
          echo "📄 Standard error:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "StandardErrorContent" --output text 2>/dev/null || echo "(could not retrieve stderr)"
        }

        FINAL_STATUS="InProgress"
        for i in $(seq 1 "$MAX_POLLS"); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "Status" --output text 2>/dev/null || echo "InProgress")
          ELAPSED=$((i * POLL_INTERVAL))

          case "$STATUS" in
            Success)
              FINAL_STATUS="Success"
              echo "✅ Docker rebuild SSM command succeeded (~${ELAPSED}s elapsed)"
              break
              ;;
            Failed|TimedOut|Cancelled|Cancelling)
              FINAL_STATUS="$STATUS"
              echo "❌ Docker rebuild SSM command ended with status: $STATUS (~${ELAPSED}s elapsed)"
              print_ssm_output
              break
              ;;
            InProgress|Pending|Delayed)
              echo "⏳ Docker rebuild SSM command ${STATUS} — poll ${i}/${MAX_POLLS} (~${ELAPSED}s / ${TIMEOUT_SECONDS}s)"
              if [ "$i" -lt "$MAX_POLLS" ]; then
                sleep "$POLL_INTERVAL"
              fi
              ;;
            *)
              echo "⏳ Docker rebuild SSM command status: ${STATUS} — poll ${i}/${MAX_POLLS} (~${ELAPSED}s / ${TIMEOUT_SECONDS}s)"
              if [ "$i" -lt "$MAX_POLLS" ]; then
                sleep "$POLL_INTERVAL"
              fi
              ;;
          esac
        done

        if [ "$FINAL_STATUS" != "Success" ]; then
          FINAL_STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "Status" --output text 2>/dev/null || echo "Unknown")

          case "$FINAL_STATUS" in
            Success)
              echo "✅ Docker rebuild SSM command succeeded"
              ;;
            InProgress|Pending|Delayed)
              echo "❌ SSM deploy command still InProgress after timeout"
              print_ssm_output
              ;;
            Failed|TimedOut|Cancelled|Cancelling)
              echo "❌ Docker rebuild SSM command ended with status: $FINAL_STATUS"
              print_ssm_output
              ;;
            *)
              echo "❌ Docker rebuild SSM command ended with unexpected status: $FINAL_STATUS"
              print_ssm_output
              ;;
          esac
        fi

        # --------------------------------------------------------------------
        # ALWAYS-RUN RECOVERY NET (independent SSM command).
        #
        # Whatever happened above — success, failure, timeout, cancellation, or
        # the main SSM worker crashing ("ipc messaging received timeout signal")
        # — we now send a SEPARATE SSM command that reconciles the stack to
        # "up" via scripts/aws/ensure_stack_up.sh. That script never runs
        # `compose down`; it only brings the stack up if the backend is not
        # responding, and it clears any stale deploy marker.
        #
        # This guarantees that an interruption between build and `up -d` cannot
        # leave production offline: a fresh SSM invocation restores it. If SSM
        # itself is unreachable this command can't run — but because we no
        # longer tear the stack down before building, the previous containers
        # are still serving in that case (Outcome B).
        # --------------------------------------------------------------------
        echo "🛟 Running independent recovery/reconcile command (ensure_stack_up.sh)..."
        RECOVERY_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd /home/ubuntu/crypto-2.0 || cd ~/crypto-2.0 || { echo \"❌ Cannot find project directory\" && exit 1; }",
            "bash scripts/aws/ensure_stack_up.sh"
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId" 2>/dev/null || true)

        RECOVERY_OK="unknown"
        if [ -n "$RECOVERY_ID" ]; then
          echo "🛟 Recovery command id: $RECOVERY_ID"
          aws ssm wait command-executed \
            --command-id "$RECOVERY_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 2>/dev/null || true
          echo "📄 Recovery output:"
          aws ssm get-command-invocation \
            --command-id "$RECOVERY_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(could not retrieve recovery stdout)"
          RECOVERY_OK=$(aws ssm get-command-invocation \
            --command-id "$RECOVERY_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "Status" --output text 2>/dev/null || echo "Unknown")
          echo "🛟 Recovery status: $RECOVERY_OK"
        else
          echo "⚠️ Could not send recovery command (SSM may be unreachable). Because no 'compose down' runs before build, the previous stack should still be serving."
        fi

        if [ "$FINAL_STATUS" != "Success" ]; then
          echo "❌ Deploy did not complete successfully (status=$FINAL_STATUS)."
          echo "   Recovery/reconcile status: $RECOVERY_OK"
          echo "   Service state: see recovery output above (ensure_stack_up reports HEALTHY/UNHEALTHY)."
          echo "   Recommended recovery command (run on PROD):"
          echo "     cd /home/ubuntu/crypto-2.0 && bash scripts/aws/ensure_stack_up.sh"
          if [ "$RECOVERY_OK" = "Success" ]; then
            echo "ℹ️ The deploy failed, but the recovery command reports the stack is UP (previous or recovered). Failing the workflow so the deploy is investigated, but production should be serving."
          fi
          exit 1
        fi

        echo "📄 Deployment output:"
        print_ssm_output
        echo "✅ Deployment completed successfully!"

        # Do NOT apply OpenClaw nginx proxy to LAB IP (172.31.x.x) on PROD — PROD must not use lab infrastructure (see .cursor/rules/aws-prod-instance.mdc).

