name: Deploy to AWS EC2 (Session Manager)

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Fetch frontend source
      run: |
        set -e
        if [ -d "frontend/.git" ]; then
          echo "Updating existing frontend repo..."
          git -C frontend pull --ff-only
        else
          echo "Cloning frontend repo..."
          rm -rf frontend
          git clone --depth 1 https://github.com/ccruz0/frontend.git frontend
        fi
        echo "Frontend HEAD:"
        git -C frontend rev-parse HEAD
        git -C frontend log -1 --oneline

    - name: Show frontend version entry
      run: |
        set -e
        echo "Checking version entry in frontend/src/app/page.tsx"
        grep -n "version: '0.46'" frontend/src/app/page.tsx || (echo "Version 0.46 not found" && exit 1)
      
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-1
        
    - name: Deploy to EC2 using Session Manager
      env:
        INSTANCE_ID: i-087953603011543c5  # atp-rebuild-2026 (PROD). Do not use crypto 2.0.
      run: |
        set -e  # Exit on any error
        
        echo "🔍 Deploying to instance: $INSTANCE_ID"
        
        # First, update code on EC2 using git pull
        echo "📥 Pulling latest code from git on EC2..."
        PULL_COMMAND_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd ~/automated-trading-platform || cd /home/ubuntu/automated-trading-platform || { echo \"❌ Cannot find project directory\" && exit 1; }",
            "git pull origin main || echo \"Git pull failed, continuing...\"",
            "if [ -d frontend ]; then",
            "  echo \"Removing existing frontend directory to ensure clean clone...\"",
            "  rm -rf frontend",
            "fi",
            "echo \"Cloning fresh frontend repo...\"",
            "git clone https://github.com/ccruz0/frontend.git frontend || { echo \"⚠️ Clone failed\" && exit 1; }",
            "echo \"🔍 Verifying frontend version...\"",
            "if ! grep -A 2 \"version: '0.46'\" frontend/src/app/page.tsx | head -1 > /dev/null; then",
            "  echo \"⚠️ Version 0.46 not found in frontend! Current version:\"",
            "  grep -n \"version:\" frontend/src/app/page.tsx | head -1",
            "  echo \"Frontend HEAD:\"",
            "  git -C frontend rev-parse HEAD",
            "  git -C frontend log -1 --oneline",
            "  exit 1",
            "fi",
            "echo \"✅ Code updated and verified\""
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId")
        
        # Wait for git pull to complete
        echo "⏳ Waiting for code update..."
        aws ssm wait command-executed \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 || true
        
        # Get output from git pull command to verify it worked
        echo "📄 Git pull output:"
        aws ssm get-command-invocation \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "StandardOutputContent" --output text || echo "Could not retrieve git pull output"
        
        # Check if git pull succeeded
        PULL_STATUS=$(aws ssm get-command-invocation \
          --command-id "$PULL_COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "Status" --output text 2>/dev/null || echo "Unknown")
        
        if [ "$PULL_STATUS" != "Success" ]; then
          echo "⚠️ Git pull status: $PULL_STATUS"
          echo "⚠️ Continuing anyway, but frontend may not be updated..."
        fi
        
        # Now rebuild and restart
        echo "🐳 Rebuilding and restarting services..."
        
        # Execute deployment via SSM with proper JSON formatting
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids $INSTANCE_ID \
          --document-name "AWS-RunShellScript" \
          --parameters 'commands=[
            "cd ~/automated-trading-platform || cd /home/ubuntu/automated-trading-platform || { echo \"❌ Cannot find project directory\" && exit 1; }",
            "echo \"📁 Current directory: $(pwd)\"",
            "echo \"🔍 Verifying frontend version before build...\"",
            "LAST_VERSION=$(grep -n \"version:\" frontend/src/app/page.tsx | tail -1 | grep -o \"'0\\.[0-9]*'\" | head -1)",
            "if [ \"$LAST_VERSION\" = \"'0.46'\" ]; then",
            "  echo \"✅ Found version 0.46 (last version in array)\"",
            "  echo \"✅ Frontend version 0.46 verified\"",
            "else",
            "  echo \"⚠️ Version 0.46 not found! Last version: $LAST_VERSION\"",
            "  grep -n \"version:\" frontend/src/app/page.tsx | tail -3",
            "  exit 1",
            "fi",
            "echo \"🐳 Rebuilding and restarting ALL services with --profile aws...\"",
            "docker compose --profile aws down || true",
            "docker compose --profile aws build --no-cache",
            "docker compose --profile aws up -d --build",
            "echo \"⏳ Waiting for services to start (backend needs ~3 minutes for healthcheck)...\"",
            "echo \"⏳ Waiting 30 seconds for initial startup...\"",
            "sleep 30",
            "echo \"⏳ Waiting for backend healthcheck (up to 3 minutes)...\"",
            "for i in {1..20}; do",
            "  if curl -f --connect-timeout 5 http://localhost:8002/ping_fast >/dev/null 2>&1; then",
            "    echo \"✅ Backend is healthy!\"",
            "    break",
            "  fi",
            "  echo \"⏳ Backend not ready yet, waiting... ($i/20)\"",
            "  sleep 10",
            "done",
            "echo \"🔄 Restarting nginx to reconnect to services...\"",
            "sudo systemctl restart nginx || echo \"⚠️  nginx restart failed, continuing...\"",
            "sleep 5",
            "echo \"✅ Verifying deployment...\"",
            "docker compose --profile aws ps",
            "echo \"✅ Deployment completed!\""
          ]' \
          --region ap-southeast-1 \
          --output text \
          --query "Command.CommandId")
        
        echo "📋 Command ID: $COMMAND_ID"
        
        # Wait for command to complete (with timeout)
        echo "⏳ Waiting for deployment to complete (this may take several minutes)..."
        for i in {1..30}; do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $INSTANCE_ID \
            --region ap-southeast-1 \
            --query "Status" --output text 2>/dev/null || echo "InProgress")
          
          if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ]; then
            break
          fi
          echo "⏳ Still running... ($i/30)"
          sleep 10
        done
        
        # Get command output
        echo "📄 Deployment output:"
        aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "StandardOutputContent" --output text || echo "Could not retrieve output"
        
        # Check final status
        FINAL_STATUS=$(aws ssm get-command-invocation \
          --command-id "$COMMAND_ID" \
          --instance-id $INSTANCE_ID \
          --region ap-southeast-1 \
          --query "Status" --output text 2>/dev/null || echo "Unknown")
        
        if [ "$FINAL_STATUS" = "Success" ]; then
          echo "✅ Deployment completed successfully!"
        else
          echo "⚠️ Deployment status: $FINAL_STATUS"
          echo "Check the output above for details"
        fi
        
        echo "🎉 Deployment command sent successfully!"

