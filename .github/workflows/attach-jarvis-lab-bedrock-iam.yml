# One-shot: attach bedrock:InvokeModel to IAM user jarvis-lab-bedrock.
# Requires repository secrets AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY with iam:PutUserPolicy.
name: Attach Jarvis LAB Bedrock IAM policy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Attach Bedrock invoke policy
        run: bash scripts/aws/attach_jarvis_lab_bedrock_iam_policy.sh
