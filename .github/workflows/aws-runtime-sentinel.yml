name: AWS Runtime Sentinel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-production-runtime:
    name: Verify production runtime
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      AWS_DEFAULT_REGION: ap-southeast-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run AWS runtime verification
        id: verify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python scripts/aws_runtime_verify.py
          EXIT=$?
          echo "exitcode=${EXIT}" >> "$GITHUB_OUTPUT"
          exit "$EXIT"

      - name: Mark critical on violation
        if: failure() && steps.verify.outputs.exitcode == '2'
        run: |
          echo "::error::CRITICAL RUNTIME VIOLATION - Production runtime verification failed (exit 2). Block deployment until resolved."
          echo "## CRITICAL RUNTIME VIOLATION" >> "$GITHUB_STEP_SUMMARY"
          echo "Deployment is blocked. Resolve runtime violations (SSM unreachable, duplicate pollers, port exposure, or other critical checks) before deploying." >> "$GITHUB_STEP_SUMMARY"
