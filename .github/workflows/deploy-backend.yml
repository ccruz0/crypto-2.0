name: Deploy backend (ECR + EC2/SSM)
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
concurrency:
  group: deploy-backend
  cancel-in-progress: false
permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: ${{ vars.ECR_BACKEND_REPOSITORY }}
          SHA: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPO"
          docker build -f backend/Dockerfile.aws \
            --build-arg GIT_SHA="$SHA" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE:$SHA" -t "$IMAGE:latest" .
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:$SHA" >> "$GITHUB_OUTPUT"
      - name: Deploy on EC2 via SSM (pull + compose up backend-aws + canary + healthcheck + rollback)
        env:
          REGION: ${{ vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          COMPOSE_DIR: ${{ vars.COMPOSE_DIR }}
          IMAGE: ${{ steps.build.outputs.image }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          read -r -d '' REMOTE <<EOF || true
          set -e
          cd ${COMPOSE_DIR}
          # Sync compose from main so market-updater gets TRADING_CONFIG_PATH + volume
          # without requiring a full working-tree reset on the host.
          # SSM runs as root; ubuntu deploy key is mode 600. Use it via GIT_SSH_COMMAND.
          # Best-effort: never block ECR pull/up if git SSH fails under the agent.
          export HOME=/home/ubuntu
          export GIT_SSH_COMMAND='ssh -i /home/ubuntu/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new'
          git config --global --add safe.directory ${COMPOSE_DIR} 2>/dev/null || true
          if git -C ${COMPOSE_DIR} fetch origin main \
            && git -C ${COMPOSE_DIR} checkout origin/main -- docker-compose.yml; then
            echo "Compose synced from origin/main"
          else
            echo "WARNING: compose git sync failed; continuing with on-host docker-compose.yml"
          fi
          aws ecr get-login-password --region ${REGION} | docker login --username AWS --password-stdin ${REGISTRY}
          CUR=\$(docker inspect --format='{{.Config.Image}}' \$(docker compose -f ${COMPOSE_DIR}/docker-compose.yml ps -q backend-aws) 2>/dev/null || true)
          [ -n "\$CUR" ] && docker tag "\$CUR" atp-backend-rollback:predeploy || true
          docker pull ${IMAGE}
          BACKEND_IMAGE=${IMAGE} docker compose -f ${COMPOSE_DIR}/docker-compose.yml --profile aws up -d --no-deps backend-aws backend-aws-canary
          # Recreate market-updater so new image + config volume mount apply.
          BACKEND_IMAGE=${IMAGE} docker compose -f ${COMPOSE_DIR}/docker-compose.yml --profile aws up -d --no-deps --force-recreate market-updater-aws
          ok=0
          for i in \$(seq 1 60); do
            if curl -fsS http://localhost:8002/api/health/ready >/dev/null; then ok=1; break; fi
            sleep 5
          done
          if [ "\$ok" != "1" ]; then
            echo "HEALTHCHECK FAILED - rollback"
            BACKEND_IMAGE=atp-backend-rollback:predeploy docker compose -f ${COMPOSE_DIR}/docker-compose.yml --profile aws up -d --no-deps backend-aws backend-aws-canary market-updater-aws || true
            exit 1
          fi
          # Pin the deployed image digest in .env so a later MANUAL "docker compose up"
          # (e.g. to apply an env-var change in .env.aws, or any --force-recreate) reuses
          # THIS image via ${BACKEND_IMAGE:-...:latest} interpolation, instead of falling
          # back to a stale local :latest and silently reverting the deployed code.
          if grep -q '^BACKEND_IMAGE=' ${COMPOSE_DIR}/.env 2>/dev/null; then
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE}|" ${COMPOSE_DIR}/.env
          else
            echo "BACKEND_IMAGE=${IMAGE}" >> ${COMPOSE_DIR}/.env
          fi
          echo "Pinned BACKEND_IMAGE=${IMAGE} in ${COMPOSE_DIR}/.env"
          echo "DEPLOY OK"
          EOF
          PARAMS=$(jq -n --arg cmd "$REMOTE" '{commands: [$cmd]}')
          CMD_ID=$(aws ssm send-command --region "$REGION" --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" --comment "Deploy backend" \
            --parameters "$PARAMS" --query "Command.CommandId" --output text)
          echo "SSM CommandId: $CMD_ID"
          # Poll until the SSM command reaches a TERMINAL state before judging it.
          # The remote can run up to ~5 min (300s healthcheck loop past backend
          # start_period), which is longer than the default `aws ssm wait
          # command-executed` timeout (~100s). Reading Status right after that
          # waiter returned marked healthy deploys as failed because the command
          # was still "InProgress". Poll for up to 15 min and use the final Status.
          STATUS="Pending"
          for i in $(seq 1 90); do
            STATUS=$(aws ssm get-command-invocation --region "$REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|TimedOut|Cancelled) break ;;
              *) sleep 10 ;;
            esac
          done
          echo "----- remote stdout -----"
          aws ssm get-command-invocation --region "$REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardOutputContent" --output text || true
          echo "----- remote stderr -----"
          aws ssm get-command-invocation --region "$REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query "StandardErrorContent" --output text || true
          [ "$STATUS" = "Success" ] || { echo "Deploy status: $STATUS"; exit 1; }
