# Fix 504 on /openclaw/ via EC2 Instance Connect + SSH (no SSM required).
# Run when OpenClaw tab shows 504 or "upstream timed out".
# - Starts nginx on PROD if stopped, applies proxy to LAB:8080 (compose default), reloads nginx.
# - Tries to start OpenClaw on LAB from PROD via SSH (if PROD has key to LAB).
name: Fix OpenClaw 504 (EICE)

on:
  workflow_dispatch:
  schedule:
    # Run at 06:00 and 18:00 UTC; increases chance nginx/OpenClaw are up after instance restarts
    - cron: '0 6,18 * * *'

permissions:
  contents: read

jobs:
  fix-openclaw-504:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Fix OpenClaw 504 on PROD (EICE + SSH)
        run: bash scripts/openclaw/fix_504_via_eice.sh

      - name: Start OpenClaw on LAB (EICE direct)
        continue-on-error: true
        run: bash scripts/openclaw/start_openclaw_on_lab_via_eice.sh
