# LEGACY: Deploy via SSH/rsync. Not triggered on push.
# Default deploy on push to main is "Deploy to AWS EC2 (Session Manager)" (deploy_session_manager.yml).
# Use this workflow only for manual SSH-based deploy (e.g. when SSM is unavailable).
name: Deploy to AWS EC2 (Legacy SSH)

# ============================================
# DEPLOYMENT WORKFLOW NOTES
# ============================================
# Root Cause: The workflow was using deprecated 'docker-compose' (hyphenated) syntax
#             and missing the '--profile aws' flag required by docker-compose.yml
#
# Changes Made:
#   - Replaced 'docker-compose' with 'docker compose' (Docker Compose V2 syntax)
#   - Added '--profile aws' flag to all docker compose commands to only manage AWS profile services
#   - Updated lines 75-76: docker compose --profile aws down/up commands
#   - Updated line 81: docker compose --profile aws ps command
#
# Manual Verification:
#   ssh hilovivo-aws 'cd /home/ubuntu/crypto-2.0 && docker compose --profile aws ps'
#   ssh hilovivo-aws 'cd /home/ubuntu/crypto-2.0 && docker compose --profile aws logs -n 60 backend-aws'
#   ssh hilovivo-aws 'cd /home/ubuntu/crypto-2.0 && docker compose --profile aws logs -n 60 frontend-aws'
# ============================================

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    # No GitHub Environment is used; use Repository Variables (Settings → Secrets and variables → Actions → Variables).
    env:
      # EC2_HOST must be atp-rebuild-2026 (PROD): dashboard.hilovivo.com or its Elastic IP. Do not use crypto 2.0.
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ubuntu
      EC2_KEY: ${{ secrets.EC2_KEY }}
      # PUBLIC_BASE_URL / API_BASE_URL: set in Repository Variables (Actions → Variables). Required so the deploy step and backend know the public API endpoint.
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
    
    steps:
    - name: Checkout API
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true
        submodules: false  # Disable submodules since frontend is cloned manually
      
    - name: Fetch frontend source
      run: |
        set -e
        if [ -d "frontend/.git" ]; then
          echo "Updating existing frontend repo..."
          git -C frontend pull --ff-only
        else
          echo "Cloning frontend repo..."
          rm -rf frontend
          git clone --depth 1 https://github.com/ccruz0/frontend.git frontend
        fi
        echo "Frontend HEAD:"
        git -C frontend rev-parse HEAD
        git -C frontend log -1 --oneline
      
    - name: Verify checkout
      run: |
        echo "✅ Repository checked out successfully"
        echo "📁 Current directory: $(pwd)"
        echo "📦 Git status:"
        git status --short || echo "⚠️ Git status check failed"
      
    - name: Audit trading pairs
      run: |
        python3 scripts/audit_pairs_focused.py || exit 1

    - name: Debug base urls present
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${PUBLIC_BASE_URL:-}" ]]; then echo "PUBLIC_BASE_URL=SET"; else echo "PUBLIC_BASE_URL=MISSING"; fi
        if [[ -n "${API_BASE_URL:-}" ]]; then echo "API_BASE_URL=SET"; else echo "API_BASE_URL=MISSING"; fi
      
    - name: Deploy to EC2
      env:
        PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
        API_BASE_URL: ${{ vars.API_BASE_URL }}
      run: |
        set -e  # Exit on any error
        
        # Validate required connection configuration
        if [ -z "$EC2_HOST" ]; then
          echo "❌ Error: EC2_HOST is not set. Add it as a repository secret or variable."
          echo "💡 Production is atp-rebuild-2026 (i-087953603011543c5). Set EC2_HOST to its DNS or Elastic IP (e.g. dashboard.hilovivo.com). Do not use crypto 2.0."
          exit 1
        fi
        if [ -z "$EC2_KEY" ]; then
          echo "❌ Error: EC2_KEY secret is not set."
          exit 1
        fi
        
        # Validate required environment variables for backend configuration
        # Backend requires PUBLIC_BASE_URL (preferred) or API_BASE_URL to avoid hardcoded IPs
        if [ -z "${PUBLIC_BASE_URL:-}" ] && [ -z "${API_BASE_URL:-}" ]; then
          echo "❌ Error: Neither PUBLIC_BASE_URL nor API_BASE_URL is set."
          echo "💡 Set one of these environment variables:"
          echo "   - PUBLIC_BASE_URL (preferred): Base URL like https://dashboard.hilovivo.com"
          echo "   - API_BASE_URL (alternative): Full API URL like https://dashboard.hilovivo.com/api"
          echo "💡 Add as repository secret or workflow environment variable"
          exit 1
        fi

        # --------------------------------------------------------------------
        # Validate EC2_HOST is reachable (no hardcoded IP fallbacks)
        # --------------------------------------------------------------------
        # EC2_HOST must be set explicitly - this ensures deployments use env vars/DNS, not embedded IPs
        echo "🔍 Validating EC2_HOST connectivity: $EC2_HOST"
        if ! timeout 5 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/22" 2>/dev/null; then
          echo "❌ Error: EC2_HOST ($EC2_HOST) is not reachable on port 22."
          echo "💡 Verify:"
          echo "   1. EC2_HOST is set to the correct Elastic IP or DNS name"
          echo "   2. Security Group allows SSH (port 22) from GitHub Actions IPs"
          echo "   3. EC2 instance is running"
          exit 1
        fi

        echo "✅ EC2_HOST is reachable: $EC2_HOST"
        EC2_TARGET_HOST="$EC2_HOST"
        
        echo "🔑 Setting up SSH key..."
        echo "$EC2_KEY" > deploy_key.pem
        chmod 600 deploy_key.pem
        
        # Create .ssh directory if it doesn't exist and add EC2 host to known_hosts
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -H $EC2_TARGET_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
        
        echo "📡 Testing SSH connection..."
        echo "🔍 Attempting to connect to: ubuntu@$EC2_TARGET_HOST"
        echo "🔍 Using IP: $EC2_TARGET_HOST"
        
        # Test basic connectivity first
        echo "🌐 Testing basic connectivity..."
        ping -c 3 $EC2_TARGET_HOST || echo "⚠️ Ping failed, but continuing with SSH test..."
        
        # Test SSH connection
        ssh -i deploy_key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR ubuntu@$EC2_TARGET_HOST "echo 'SSH connection successful'"
        
        if [ $? -ne 0 ]; then
          echo "❌ SSH connection failed. Checking common issues..."
          echo "🔍 Verifying EC2 instance status..."
          echo "💡 Make sure your EC2 instance is running and has the correct security group rules"
          echo "💡 Security Group should allow SSH (port 22) from 0.0.0.0/0"
          echo "💡 Verify the EC2_HOST and EC2_KEY secrets are correct"
          exit 1
        fi
        
        # Pre-sync: Ensure destination directory exists and has correct permissions
        echo "🔧 Pre-sync checks: Ensuring destination directory permissions..."
        ssh -i deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$EC2_TARGET_HOST \
          "mkdir -p ~/automated-trading-platform && \
           chmod 755 ~/automated-trading-platform && \
           test -w ~/automated-trading-platform" || {
          echo "❌ Failed to set up destination directory permissions"
          exit 1
        }
        
        # Pre-sync: Fix permissions on existing files to allow rsync to overwrite them
        echo "🔧 Pre-sync: Fixing permissions on existing files..."
        ssh -i deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$EC2_TARGET_HOST \
          "cd ~/automated-trading-platform && \
           ([ -d frontend ] && find frontend -type f -exec chmod 644 {} \; 2>/dev/null || true) && \
           ([ -d frontend ] && find frontend -type d -exec chmod 755 {} \; 2>/dev/null || true) && \
           echo '✅ Pre-sync permissions fixed'"
        
        echo "📁 Copying files to EC2..."
        # Use --partial to continue on errors, but still fail if critical files can't be copied
        rsync -avz \
          --chmod=Du=rwx,go=rx,Fu=rw,go=r \
          --partial \
          -e "ssh -i deploy_key.pem -o StrictHostKeyChecking=no" \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next' \
          --exclude='__pycache__' \
          --exclude='frontend/artifacts' \
          --exclude='frontend/test-results' \
          --exclude='frontend/playwright-report' \
          ./ ubuntu@$EC2_TARGET_HOST:~/automated-trading-platform/ || {
          echo "⚠️ rsync completed with some errors, but continuing deployment..."
        }
        
        # Post-sync: Fix permissions for Docker compatibility
        echo "🔧 Post-sync: Ensuring Docker-compatible permissions..."
        ssh -i deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$EC2_TARGET_HOST \
          "cd ~/automated-trading-platform && \
           find . -type d ! -perm 755 -exec chmod 755 {} \; 2>/dev/null || true && \
           find . -type f ! -perm -u+r -exec chmod u+r {} \; 2>/dev/null || true && \
           ([ -d backend ] && find backend -type d -exec chmod 755 {} \; 2>/dev/null || true) && \
           ([ -d backend ] && find backend -type f -exec chmod 644 {} \; 2>/dev/null || true) && \
           ([ -d frontend ] && find frontend -type d -exec chmod 755 {} \; 2>/dev/null || true) && \
           ([ -d frontend ] && find frontend -type f -exec chmod 644 {} \; 2>/dev/null || true) && \
           find . -type f \\( -name '*.sh' -o -name '*.bash' \\) -exec chmod +x {} \\; 2>/dev/null || true && \
           echo '✅ Permissions fixed for Docker compatibility'"
        
        echo "🚀 Running standardized deploy script..."
        # Use the standardized deploy script for consistent deployments
        ssh -i deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$EC2_TARGET_HOST \
          "cd ~/automated-trading-platform && bash scripts/deploy_aws.sh" || {
          echo "❌ Deployment script failed"
          exit 1
        }
        
        echo "✅ Verifying deployment health..."
        # Verify health/system endpoint - fail if market_updater or market_data freshness fails
        HEALTH_CHECK=$(ssh -i deploy_key.pem -o StrictHostKeyChecking=no ubuntu@$EC2_TARGET_HOST \
          "cd ~/automated-trading-platform && curl -sS http://localhost:8002/api/health/system" || echo "")
        
        if [ -z "$HEALTH_CHECK" ]; then
          echo "❌ Health endpoint not responding"
          exit 1
        fi
        
        # Check market_updater and market_data status (requires jq)
        if command -v jq &> /dev/null; then
          MARKET_UPDATER_STATUS=$(echo "$HEALTH_CHECK" | jq -r '.market_updater.status // "UNKNOWN"')
          MARKET_DATA_STALE=$(echo "$HEALTH_CHECK" | jq -r '.market_data.stale_symbols // "UNKNOWN"')
          
          if [ "$MARKET_UPDATER_STATUS" != "PASS" ]; then
            echo "❌ Market updater status is not PASS: $MARKET_UPDATER_STATUS"
            exit 1
          fi
          
          if [ "$MARKET_DATA_STALE" != "0" ] && [ "$MARKET_DATA_STALE" != "null" ]; then
            echo "❌ Market data has stale symbols: $MARKET_DATA_STALE"
            exit 1
          fi
          
          echo "✅ Health check passed: market_updater=$MARKET_UPDATER_STATUS, stale_symbols=$MARKET_DATA_STALE"
        else
          echo "⚠️  jq not available, skipping detailed health check"
        fi
        
        # Verify public URL (PROD at EC2_HOST) responds
        if [ -n "${API_BASE_URL:-}" ]; then
          echo "🔍 Verifying public API at $API_BASE_URL..."
          PUBLIC_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 15 "${API_BASE_URL%/}/health" 2>/dev/null || echo "000")
          if [ "$PUBLIC_CODE" = "200" ]; then
            echo "✅ Public API reachable (HTTP $PUBLIC_CODE)"
          else
            echo "⚠️  Public API returned HTTP $PUBLIC_CODE (deploy may still be OK; check nginx/dashboard)"
          fi
        fi
        
        echo "🧹 Cleaning up..."
        rm deploy_key.pem
        
        echo "🎉 Deployment completed successfully!"


